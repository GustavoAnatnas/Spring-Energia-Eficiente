name: CI/CD Spring Energia Eficiente

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permissão ao mvnw
        run: chmod +x mvnw

      - name: Build com Maven
        run: ./mvnw clean install -DskipTests

      - name: Rodar testes
        run: ./mvnw test

  docker:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Build da imagem Docker
        run: docker build -t spring-energia-eficiente .

  staging:
    needs: docker
    runs-on: ubuntu-latest

    steps:
        - name: Checkout do código
          uses: actions/checkout@v3

        - name: Subir ambiente com Docker Compose
          run: docker compose up -d

        - name: Verificar containers
          run: docker ps

  production:
    needs: staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simular deploy em produção
        run: echo "Deploy em produção realizado com sucesso"