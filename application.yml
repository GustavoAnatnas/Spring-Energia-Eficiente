spring:
  datasource:
    url: jdbc:oracle:thin:@//oracle-db:1521/EFICIENTE
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${ORACLE_USER:SYSTEM}
    password: ${ORACLE_PASSWORD:170101}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.OracleDialect

jwt:
  secret: "${JWT_SECRET}"
  expiration: "${JWT_EXPIRATION}"
